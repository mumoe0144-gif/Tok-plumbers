  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TO K Plumbing Services - Toronto Emergency Plumber</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: url('https://media.meta-ai.com/v1/media/image/27187506640871487') no-repeat center fixed;
  background-size: cover;
  color: white;
  min-height: 100vh;
}
.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 45px 35px;
  max-width: 520px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
h1 { 
  font-size: 2.4em; 
  margin-bottom: 12px; 
  font-weight: 700;
  background: linear-gradient(135deg, #ff8a00, #ff3d00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
p { 
  font-size: 1.1em; 
  margin-bottom: 25px; 
  opacity: 0.9;
  line-height: 1.6;
}
.badges {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 30px;
}
.badge {
  background: rgba(255,255,255,0.15);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 0.8em;
  border: 1px solid rgba(255,255,255,0.2);
}
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
button {
  background: #ff6b00;
  color: white;
  border: none;
  padding: 18px;
  font-size: 1.1em;
  font-weight: 600;
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  transition: all 0.3s;
  box-shadow: 0 8px 20px rgba(255,107,0,0.3);
}
button:hover { 
  background: #e55f00; 
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(255,107,0,0.5);
}
button.urgent { 
  background: #d32f2f; 
  box-shadow: 0 8px 20px rgba(211,47,47,0.3);
}
button.urgent:hover { 
  background: #b71c1c; 
  box-shadow: 0 12px 30px rgba(211,47,47,0.5);
}

/* Popup form */
.popup {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(5px);
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.popup-content {
  background: white;
  color: #333;
  padding: 35px 30px;
  border-radius: 18px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.popup-content h3 {
  margin-bottom: 20px;
  color: #ff6b00;
  font-size: 1.4em;
  font-weight: 600;
}
.popup-content input, .popup-content select {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  font-size: 1em;
  font-family: 'Poppins', sans-serif;
  box-sizing: border-box;
  transition: border 0.3s;
}
.popup-content input:focus, .popup-content select:focus {
  border-color: #ff6b00;
  outline: none;
}
.popup-content button {
  width: 100%;
  margin-top: 18px;
  padding: 16px;
}
.close { 
  float: right; 
  font-size: 28px; 
  cursor: pointer; 
  color: #999;
  line-height: 1;
}
.close:hover { color: #333; }

@media (max-width: 600px) {
  .card { padding: 35px 25px; }
  h1 { font-size: 2em; }
}
</style>
</head>
<body>
<div class="overlay">
  <div class="card">
    <h1>TO K Plumbing</h1>
    <p>Toronto + 30km Radius | Emergency Repairs | Free 30min Diagnosis</p>
    
    <div class="badges">
      <div class="badge">✓ 24/7 Emergency</div>
      <div class="badge">✓ Free Diagnosis</div>
      <div class="badge">✓ Upfront Pricing</div>
    </div>
    
    <div class="btn-group">
      <button onclick="openPopup('Normal')">📅 Book Service Now</button>
      <button class="urgent" onclick="openPopup('URGENT')">🚨 Emergency Plumber</button>
    </div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">&times;</span>
    <h3>Book Your Appointment</h3>
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>
    <input type="text" id="location" placeholder="Service Address / Full Location" required>
