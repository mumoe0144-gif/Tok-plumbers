<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TO K Plumbing Services - Toronto Emergency Plumber</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: url('https://media.meta-ai.com/v1/media/image/27187506640871487') no-repeat center fixed;
  background-size: cover;
  color: white;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.overlay {
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 50px 40px;
  max-width: 550px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.logo {
  font-size: 3em;
  font-weight: 700;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #ff8a00, #ff3d00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  font-size: 1.1em;
  opacity: 0.9;
  margin-bottom: 30px;
  line-height: 1.6;
}
.badges {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 35px;
}
.badge {
  background: rgba(255,255,255,0.15);
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 0.85em;
  border: 1px solid rgba(255,255,255,0.2);
}
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 15px;
}
.btn {
  padding: 18px;
  border: none;
  border-radius: 12px;
  font-size: 1.1em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Poppins', sans-serif;
}
.btn-primary {
  background: linear-gradient(135deg, #ff8a00, #ff6b00);
  color: white;
  box-shadow: 0 8px 20px rgba(255,107,0,0.4);
}
.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(255,107,0,0.6);
}
.btn-danger {
  background: linear-gradient(135deg, #ff3d00, #d32f2f);
  color: white;
  box-shadow: 0 8px 20px rgba(211,47,47,0.4);
}
.btn-danger:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(211,47,47,0.6);
}

/* Popup */
.popup {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(5px);
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.popup-content {
  background: white;
  color: #333;
  padding: 40px 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.popup-content h3 {
  margin-bottom: 25px;
  color: #ff6b00;
  font-size: 1.5em;
}
.popup-content input, .popup-content select {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  font-size: 1em;
  font-family: 'Poppins', sans-serif;
  transition: border 0.3s;
}
.popup-content input:focus, .popup-content select:focus {
  border-color: #ff6b00;
  outline: none;
}
.popup-content button {
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  background: linear-gradient(135deg, #ff8a00, #ff6b00);
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 1.05em;
  cursor: pointer;
}
.close {
  float: right;
  font-size: 28px;
  cursor: pointer;
  color: #999;
  line-height: 1;
}

<body>
<div class="overlay">
  <div class="card">
    <div class="logo">TO K Plumbing</div>
    <div class="subtitle">Toronto + 30km Radius<br>Licensed Plumber | Fast Response</div>
    
    <div class="badges">
      <div class="badge">✓ 24/7 Emergency</div>
      <div class="badge">✓ Free 30min Diagnosis</div>
      <div class="badge">✓ Upfront Pricing</div>
    </div>
    
    <div class="btn-group">
      <button class="btn btn-primary" onclick="openPopup('Normal')">📅 Book Service Now</button>
      <button class="btn btn-danger" onclick="openPopup('URGENT')">🚨 Emergency Plumber</button>
    </div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">&times;</span>
    <h3>Book Your Plumber</h3>
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>
    <select id="urgency">
      <option value="Normal">Normal - Schedule within 4 hours</option>
      <option value="URGENT">URGENT - Leak/Burst pipe NOW</option>
    </select>
    <button onclick="bookNow()">Continue to Calendar →</button>
  </div>
</div>

<script>
let selectedUrgency = 'Normal';
function openPopup(urgency) {
  selectedUrgency = urgency;
  document.getElementById('urgency').value = urgency;
  document.getElementById('popup').style.display = 'flex';
}
function closePopup() {
  document.getElementById('popup').style.display = 'none';
}
function bookNow() {
  let name = document.getElementById('name').value;
  let email = document.getElementById('email').value;
  let phone = document.getElementById('phone').value;
  let urgency = document.getElementById('urgency').value;
  
  if(!name || !email || !phone) {
    alert('Please fill all fields');
    return;
  }
  
  let calendlyLink = 'https://calendly.com/mumoe0144/new-meeting?name=' + encodeURIComponent(name) + '&email=' + encodeURIComponent(email) + '&a1=' + encodeURIComponent(phone) + '&a2=' + encodeURIComponent(urgency);
  
  window.open(calendlyLink, '_blank');
  closePopup();
}
</script>
